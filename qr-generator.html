<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR & Barcode Generator - Sakil Web Tools</title>
    <meta name="description" content="Generate customizable premium QR Codes and Barcodes instantly with native real-time compilation.">
    <!-- Fonts, Icons & Fast Native Engines Cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Heavy-Duty Engine Core Drivers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        .utility-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (min-width: 992px) {
            .utility-dashboard { grid-template-columns: 1fr 1fr; }
        }
        .generator-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.2rem;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #10b981;
        }
        .input-box {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            font-size: 0.95rem;
            transition: border-color var(--transition-speed);
        }
        .input-box:focus { border-color: #10b981; }
        .canvas-area {
            background: #ffffff; /* Clean White Background for Scanners */
            padding: 1.5rem;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            border: 1px solid var(--border-color);
            margin: 0.5rem 0;
            position: relative;
        }
        .canvas-area img, .canvas-area svg {
            max-width: 100%;
            height: auto;
        }
        .canvas-placeholder {
            color: #9ca3af;
            font-size: 0.85rem;
            text-align: center;
        }
        .btn-util {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            transition: opacity var(--transition-speed);
        }
        .btn-util:hover { opacity: 0.9; }
        .btn-util:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- Professional Navbar Header -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-screwdriver-wrench"></i> Sakil <span>Web Tools</span>
            </a>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#image-tools" class="nav-link">Image Tools</a>
                <a href="index.html#pdf-tools" class="nav-link">PDF Tools</a>
                <a href="index.html#utility-tools" class="nav-link">Utilities</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </header>

    <!-- Main Board -->
    <main class="main-container" style="padding-top: 8rem;">
        <div class="section-header">
            <h2><i class="fa-solid fa-qrcode"></i> Digital Asset Generators</h2>
            <p>Generate precise, vector-ready commercial QR codes and standard barcodes dynamically.</p>
        </div>

        <div class="utility-dashboard">
            
            <!-- Module 1: Live QR Code Engine -->
            <div class="generator-card">
                <div class="card-title"><i class="fa-solid fa-qrcode"></i> QR Code Generator</div>
                <input type="text" id="qrInput" class="input-box" value="" placeholder="Type text or paste URL link...">
                
                <div class="canvas-area">
                    <div id="qrcode"></div>
                    <span class="canvas-placeholder" id="qrPlaceholder">Your QR code will appear here</span>
                </div>
                
                <button class="btn-util" id="downloadQrBtn" disabled><i class="fa-solid fa-download"></i> Download QR Image</button>
            </div>

            <!-- Module 2: Live Barcode Engine -->
            <div class="generator-card">
                <div class="card-title"><i class="fa-solid fa-barcode"></i> Barcode Generator</div>
                <input type="text" id="barcodeInput" class="input-box" value="" placeholder="Enter alphanumeric text (e.g., Code128)...">
                
                <div class="canvas-area">
                    <svg id="barcode"></svg>
                    <span class="canvas-placeholder" id="barcodePlaceholder">Your barcode will appear here</span>
                </div>
                
                <button class="btn-util" id="downloadBarcodeBtn" disabled><i class="fa-solid fa-download"></i> Download Barcode SVG</button>
            </div>

        </div>
    </main>

    <!-- Global Theme Linker & Compiler Integrations -->
    <script>
        // Synchronize Global Theme Layout
        const htmlElement = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = themeBtn.querySelector('i');
        
        const applyTheme = (theme) => {
            htmlElement.setAttribute('data-theme', theme);
            themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            if(theme === 'dark') themeIcon.style.color = '#fbbf24'; else themeIcon.style.color = '';
        };
        applyTheme(localStorage.getItem('sakil-tools-theme') || 'light');
        themeBtn.addEventListener('click', () => {
            const nextTheme = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('sakil-tools-theme', nextTheme);
            applyTheme(nextTheme);
        });

        // ==========================================
        // 1. ENGINE RUNNER: QR CODE GENERATOR
        // ==========================================
        const qrInput = document.getElementById('qrInput');
        const qrContainer = document.getElementById('qrcode');
        const qrPlaceholder = document.getElementById('qrPlaceholder');
        const downloadQrBtn = document.getElementById('downloadQrBtn');

        // Initialize instance with a harmless single-space value so the
        // library doesn't error out on an empty string, but nothing renders yet
        const qrEngine = new QRCode(qrContainer, {
            text: " ",
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        qrContainer.style.display = 'none'; // hide until user types something

        // Realtime typing binding
        qrInput.addEventListener('input', (e) => {
            const text = e.target.value.trim();
            if (text) {
                qrEngine.clear();
                qrEngine.makeCode(text);
                qrContainer.style.display = 'block';
                qrPlaceholder.style.display = 'none';
                downloadQrBtn.disabled = false;
            } else {
                qrEngine.clear();
                qrContainer.style.display = 'none';
                qrPlaceholder.style.display = 'block';
                downloadQrBtn.disabled = true;
            }
        });

        downloadQrBtn.addEventListener('click', () => {
            const img = qrContainer.querySelector('img');
            if (img) {
                const link = document.createElement('a');
                link.download = 'sakil-tools-qrcode.png';
                link.href = img.src;
                link.click();
            }
        });

        // ==========================================
        // 2. ENGINE RUNNER: BARCODE GENERATOR
        // ==========================================
        const barcodeInput = document.getElementById('barcodeInput');
        const barcodeSvg = document.getElementById('barcode');
        const barcodePlaceholder = document.getElementById('barcodePlaceholder');
        const downloadBarcodeBtn = document.getElementById('downloadBarcodeBtn');

        function generateBarcode() {
            const val = barcodeInput.value.trim();
            if (val) {
                try {
                    JsBarcode("#barcode", val, {
                        format: "CODE128",
                        lineColor: "#000000",
                        width: 2,
                        height: 80,
                        displayValue: true
                    });
                    barcodeSvg.style.display = 'block';
                    barcodePlaceholder.style.display = 'none';
                    downloadBarcodeBtn.disabled = false;
                } catch (e) {
                    console.log("Encoding state pending valid inputs...");
                    downloadBarcodeBtn.disabled = true;
                }
            } else {
                barcodeSvg.innerHTML = '';
                barcodeSvg.style.display = 'none';
                barcodePlaceholder.style.display = 'block';
                downloadBarcodeBtn.disabled = true;
            }
        }
        
        // Initial state: nothing typed yet
        barcodeSvg.style.display = 'none';
        downloadBarcodeBtn.disabled = true;
        barcodeInput.addEventListener('input', generateBarcode);

        downloadBarcodeBtn.addEventListener('click', () => {
            const svgElement = document.getElementById('barcode');
            const svgString = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const svgUrl = URL.createObjectURL(svgBlob);
            
            const link = document.createElement('a');
            link.href = svgUrl;
            link.download = 'sakil-tools-barcode.svg';
            link.click();
        });
    </script>
</body>
</html>
