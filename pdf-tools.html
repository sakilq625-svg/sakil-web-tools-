<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakil PDF Tools - Premium Suite</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Styling */
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            width: 100%; 
            max-width: 900px; 
            text-align: center; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }
        .card { 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #334155; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .card:hover { 
            background: #2d3748; 
            border-color: #6366f1; 
            transform: translateY(-5px); 
        }
        .card i { 
            font-size: 40px; 
            color: #6366f1; 
            margin-bottom: 15px; 
        }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sakil PDF Tools</h1>
        <p style="color: #94a3b8;">Select your preferred tool to get started</p>

        <div class="grid">
            <div class="card" onclick="alert('Merge PDF selected!')"><i class="fa-solid fa-object-group"></i><p>Merge PDF</p></div>
            <div class="card" onclick="alert('Split PDF selected!')"><i class="fa-solid fa-scissors"></i><p>Split PDF</p></div>
            <div class="card" onclick="alert('Compress selected!')"><i class="fa-solid fa-compress"></i><p>Compress PDF</p></div>
            <div class="card" onclick="alert('Word to PDF selected!')"><i class="fa-solid fa-file-word"></i><p>Word to PDF</p></div>
            <div class="card" onclick="alert('PPT to PDF selected!')"><i class="fa-solid fa-file-powerpoint"></i><p>PPT to PDF</p></div>
            <div class="card" onclick="alert('Excel to PDF selected!')"><i class="fa-solid fa-file-excel"></i><p>Excel to PDF</p></div>
            <div class="card" onclick="alert('PDF to Word selected!')"><i class="fa-solid fa-file-export"></i><p>PDF to Word</p></div>
            <div class="card" onclick="alert('Rotate PDF selected!')"><i class="fa-solid fa-rotate"></i><p>Rotate PDF</p></div>
        </div>
    </div>

</body>
</html>
