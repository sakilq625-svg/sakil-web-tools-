<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sakil Web Tools - PDF Processor</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; width: 300px; }
        button { background: #ef4444; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>PDF Tools</h1>
    <div class="grid">
        <div class="card">
            <h3>Merge PDF</h3>
            <input type="file" id="mergeIn" multiple accept="application/pdf">
            <br>
            <button onclick="mergePDFs()">Merge Selected</button>
        </div>
        <div class="card">
            <h3>Split PDF</h3>
            <input type="file" id="splitIn" accept="application/pdf">
            <br>
            <button onclick="splitPDF()">Split Page 1</button>
        </div>
    </div>

    <script>
        async function mergePDFs() {
            try {
                const files = document.getElementById('mergeIn').files;
                if (files.length < 2) return alert("Select at least 2 files");
                
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (let file of files) {
                    const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => mergedPdf.addPage(p));
                }
                const bytes = await mergedPdf.save();
                download(bytes, 'merged.pdf');
            } catch (err) { console.error(err); alert("Error merging: " + err.message); }
        }

        async function splitPDF() {
            try {
                const file = document.getElementById('splitIn').files[0];
                if (!file) return alert("Select a file");
                
                const pdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
                const newPdf = await PDFLib.PDFDocument.create();
                const [page] = await newPdf.copyPages(pdf, [0]);
                newPdf.addPage(page);
                
                const bytes = await newPdf.save();
                download(bytes, 'split_page1.pdf');
            } catch (err) { console.error(err); alert("Error splitting: " + err.message); }
        }

        function download(bytes, name) {
            const blob = new Blob([bytes], {type: 'application/pdf'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.click();
        }
    </script>
</body>
</html>
