<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakil PDF Tools - Premium Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { background: var(--card); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 900px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .header { text-align: center; margin-bottom: 2rem; }
        .grid-tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .tool-card { 
            background: #0f172a; padding: 25px; border-radius: 16px; 
            text-align: center; border: 1px solid #334155; 
            cursor: pointer; transition: all 0.3s ease; 
        }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-8px); background: #1e293b; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .tool-card i { font-size: 35px; color: var(--accent); margin-bottom: 15px; display: block; }
        .tool-card p { font-weight: 500; margin: 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Sakil PDF Tools</h1>
        <p style="color: #94a3b8;">Manage your documents with professional precision</p>
    </div>

    <div class="grid-tools">
        <div class="tool-card"><i class="fa-solid fa-object-group"></i><p>Merge PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-scissors"></i><p>Split PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-compress"></i><p>Compress PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-file-word"></i><p>Word to PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-file-powerpoint"></i><p>PPT to PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-file-excel"></i><p>Excel to PDF</p></div>
        <div class="tool-card"><i class="fa-solid fa-file-export"></i><p>PDF to Word</p></div>
        <div class="tool-card"><i class="fa-solid fa-rotate"></i><p>Rotate PDF</p></div>
    </div>
</div>

</body>
</html>
