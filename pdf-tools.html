<!DOCTYPE html>
<html lang="en" data-theme="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PDF Utilities - Sakil Web Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        /* PDF Dashboard Dark Theme Optimizations */
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #ef4444;
        }

        body { background-color: var(--bg-primary); color: var(--text-primary); }

        .pdf-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media(min-width: 768px) { .pdf-dashboard { grid-template-columns: 1fr 1fr; } }

        .tool-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 1rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-zone:hover { border-color: var(--accent-color); background: rgba(239, 68, 68, 0.05); }
        
        .file-list {
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 0.5rem;
            max-height: 180px;
            overflow-y: auto;
        }

        .split-range-input {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.8rem;
            border-radius: 8px;
            width: 100%;
        }

        .btn-pdf {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><i class="fa-solid fa-screwdriver-wrench"></i> Sakil <span>Web Tools</span></a>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="pdf-tools.html" class="nav-link active">PDF Tools</a>
            </nav>
            <div class="nav-actions"><button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-sun"></i></button></div>
        </div>
    </header>

    <main class="main-container" style="padding-top: 8rem;">
        <div class="section-header">
            <h2><i class="fa-solid fa-file-pdf"></i> Premium PDF Management Module</h2>
            <p style="color: var(--text-secondary);">Secure, local browser-based PDF processing.</p>
        </div>

        <div class="pdf-dashboard">
            <div class="tool-box">
                <h3><i class="fa-solid fa-object-group" style="color: var(--accent-color);"></i> PDF Merger</h3>
                <div class="upload-zone" onclick="document.getElementById('mergeInput').click()">
                    <i class="fa-solid fa-file-circle-plus" style="color: var(--accent-color);"></i>
                    <h4>Click to Upload PDFs</h4>
                    <input type="file" id="mergeInput" accept="application/pdf" multiple style="display: none;">
                </div>
                <div class="file-list" id="mergeFilesContainer" style="display: none;"></div>
                <button class="btn-pdf" id="mergeBtn" disabled>Combine PDFs</button>
            </div>

            <div class="tool-box">
                <h3><i class="fa-solid fa-scissors" style="color: var(--accent-color);"></i> PDF Splitter</h3>
                <div class="upload-zone" id="splitDropZone" onclick="document.getElementById('splitInput').click()">
                    <i class="fa-solid fa-file-circle-minus" style="color: var(--accent-color);"></i>
                    <h4>Click to Upload PDF</h4>
                    <input type="file" id="splitInput" accept="application/pdf" style="display: none;">
                </div>
                <div id="splitConfigArea" style="display: none; flex-direction: column; gap: 1rem;">
                    <div class="file-list"><div class="file-item"><span id="splitMetaName"></span><span id="splitMetaPages"></span></div></div>
                    <input type="text" class="split-range-input" id="splitRange" placeholder="e.g., 1-3, 5">
                    <button class="btn-pdf" id="splitBtn">Extract & Download</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // এখানে তোমার আগের জাভাস্ক্রিপ্ট লজিকটি বসিয়ে দাও, যা তুমি আগে লিখেছিলে।
        // এটি একদম ঠিকঠাক কাজ করবে।
    </script>
</body>
</html>
