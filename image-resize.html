<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer & Size KB Reducer - Sakil Web Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Fallback Styles & Theme Variables */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent-color: #6366f1;
            --border-color: #e5e7eb;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s;
            --accent-gradient: linear-gradient(135deg, #6366f1, #4f46e5);
        }
        [data-theme='dark'] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: background 0.3s; }
        
        .tool-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (min-width: 992px) {
            .tool-layout { grid-template-columns: 1.2fr 1fr; }
        }
        .upload-box {
            border: 2px dashed var(--border-color);
            border-radius: 20px;
            padding: 5rem 2rem;
            text-align: center;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all var(--transition-speed);
        }
        .upload-box:hover { border-color: var(--accent-color); }
        .upload-box i { font-size: 3.5rem; color: var(--accent-color); margin-bottom: 1rem; }
        
        .preview-pane {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .preview-pane img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        
        .control-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }
        .meta-info {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-left: 4px solid var(--accent-color);
        }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-box {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
        }
        .btn-action {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo"><i class="fa-solid fa-screwdriver-wrench"></i> Sakil <span>Web Tools</span></a>
            <nav class="nav-menu">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link active">Image Tools</a>
            </nav>
            <div class="nav-actions"><button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button></div>
        </div>
    </header>

    <main class="main-container" style="padding: 8rem 2rem;">
        <div class="section-header">
            <h2><i class="fa-solid fa-compress"></i> Image Resizer & KB Reducer</h2>
        </div>

        <div class="tool-layout">
            <div class="workspace-area">
                <div class="upload-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-regular fa-images"></i>
                    <h3>Choose or Drop Your Image</h3>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>

                <div class="preview-pane" id="previewPane">
                    <img id="imagePreview" src="" alt="Preview">
                    <button class="btn-action" style="background:#ef4444;" onclick="location.reload()"><i class="fa-solid fa-trash"></i> Clear</button>
                </div>
            </div>

            <div class="control-panel" id="controlPanel">
                <h3>Image Settings</h3>
                <div class="meta-info" id="originalMeta">Loading...</div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Width</label>
                        <input type="number" id="widthInput" class="input-box">
                    </div>
                    <div class="input-group">
                        <label>Height</label>
                        <input type="number" id="heightInput" class="input-box">
                    </div>
                </div>
                <button class="btn-action" id="processBtn"><i class="fa-solid fa-download"></i> Process & Download</button>
            </div>
        </div>
    </main>

    <script>
        const htmlElement = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');
        const applyTheme = (theme) => {
            htmlElement.setAttribute('data-theme', theme);
            themeBtn.querySelector('i').className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };
        applyTheme(localStorage.getItem('sakil-tools-theme') || 'light');
        themeBtn.addEventListener('click', () => {
            const next = htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('sakil-tools-theme', next);
            applyTheme(next);
        });

        const fileInput = document.getElementById('fileInput'), dropzone = document.getElementById('dropzone'), previewPane = document.getElementById('previewPane'), controlPanel = document.getElementById('controlPanel'), imagePreview = document.getElementById('imagePreview'), originalMeta = document.getElementById('originalMeta'), widthInput = document.getElementById('widthInput'), heightInput = document.getElementById('heightInput'), processBtn = document.getElementById('processBtn');

        let originalImg = new Image();
        fileInput.addEventListener('change', (e) => { if(e.target.files.length) processFile(e.target.files[0]); });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImg.src = event.target.result;
                originalImg.onload = () => {
                    imagePreview.src = event.target.result;
                    widthInput.value = originalImg.width;
                    heightInput.value = originalImg.height;
                    dropzone.style.display = 'none';
                    previewPane.style.display = 'flex';
                    controlPanel.style.display = 'flex';
                };
            };
            reader.readAsDataURL(file);
        }

        processBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = widthInput.value; canvas.height = heightInput.value;
            canvas.getContext('2d').drawImage(originalImg, 0, 0, canvas.width, canvas.height);
            const link = document.createElement('a');
            link.download = 'resized-image.jpg';
            link.href = canvas.toDataURL('image/jpeg');
            link.click();
        });
    </script>
</body>
</html>
