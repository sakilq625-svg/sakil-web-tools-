<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality Image Resizer - Sakil Web Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-color: #6366f1;
            --text-primary: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); margin: 0; padding-top: 5rem; }
        .tool-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        @media (min-width: 768px) { .tool-layout { grid-template-columns: 1fr 1fr; } }
        
        .upload-box { border: 2px dashed #475569; border-radius: 20px; padding: 3rem; text-align: center; background: var(--bg-secondary); cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--accent-color); }
        .preview-pane, .control-panel { background: var(--bg-secondary); border-radius: 20px; padding: 1.5rem; display: none; }
        
        img { max-width: 100%; border-radius: 12px; margin-bottom: 1rem; }
        .input-box { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 1rem; }
        .btn-action { background: var(--accent-color); color: white; border: none; padding: 1rem; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

<main class="tool-layout">
    <div class="workspace-area">
        <div class="upload-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--accent-color);"></i>
            <h3>Upload Image</h3>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
        <div class="preview-pane" id="previewPane">
            <img id="imagePreview" src="">
            <button class="btn-action" style="background:#ef4444;" onclick="location.reload()">Clear</button>
        </div>
    </div>

    <div class="control-panel" id="controlPanel">
        <h3>Adjust Settings</h3>
        <input type="number" id="widthInput" class="input-box" placeholder="Width (px)">
        <input type="number" id="heightInput" class="input-box" placeholder="Height (px)">
        <input type="number" id="targetKbInput" class="input-box" placeholder="Target Size (KB) - Optional">
        <button class="btn-action" id="processBtn">Process & Download</button>
    </div>
</main>

<script>
    const fileInput = document.getElementById('fileInput'), previewPane = document.getElementById('previewPane'), controlPanel = document.getElementById('controlPanel'), dropzone = document.getElementById('dropzone'), imagePreview = document.getElementById('imagePreview'), widthInput = document.getElementById('widthInput'), heightInput = document.getElementById('heightInput'), targetKbInput = document.getElementById('targetKbInput'), processBtn = document.getElementById('processBtn');
    let originalImg = new Image();

    fileInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg.src = event.target.result;
            originalImg.onload = () => {
                imagePreview.src = originalImg.src;
                widthInput.value = originalImg.width;
                heightInput.value = originalImg.height;
                dropzone.style.display = 'none';
                previewPane.style.display = 'block';
                controlPanel.style.display = 'block';
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    processBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        // কোয়ালিটি ঠিক রাখার জন্য হাই রেজোলিউশন ক্যানভাস
        canvas.width = widthInput.value;
        canvas.height = heightInput.value;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);

        let quality = 0.95; 
        const mimeType = 'image/jpeg';
        let dataUrl = canvas.toDataURL(mimeType, quality);

        // সাইজ কমানোর জন্য স্মার্ট কমপ্রেশন
        if(targetKbInput.value) {
            let step = 0.05;
            for(let i = 0; i < 10; i++) {
                if((dataUrl.length * 0.75) / 1024 > targetKbInput.value) {
                    quality -= step;
                    dataUrl = canvas.toDataURL(mimeType, quality);
                }
            }
        }

        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'resized-image.jpg';
        a.click();
    };
</script>
</body>
</html>
