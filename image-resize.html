<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakil Pro Image Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
        .wrapper { background: var(--card); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .upload-zone { border: 2px dashed #475569; padding: 2.5rem; text-align: center; border-radius: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 1.5rem; }
        .upload-zone:hover { border-color: var(--accent); background: #1e293b; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 16px; }
        #preview { max-width: 100%; margin: 1rem 0; border-radius: 12px; display: none; }
        .info { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 style="text-align:center; margin-top:0;">Sakil Pro Optimizer</h2>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <p>Drop Image or Click to Upload</p>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
    <img id="preview" src="">
    
    <label>Width (px)</label><input type="number" id="width">
    <label>Target Size (KB)</label><input type="number" id="targetKb" placeholder="e.g. 200">
    <label>Quality (%)</label><input type="range" id="quality" min="10" max="100" value="90">
    
    <button class="btn" id="processBtn">Resize & Optimize</button>
    <p class="info">* EXIF Data automatically removed for privacy.</p>
</div>

<script>
    const fileInput = document.getElementById('fileInput'), preview = document.getElementById('preview'), 
          widthInput = document.getElementById('width'), targetKb = document.getElementById('targetKb'),
          qualityInput = document.getElementById('quality');
    let img = new Image();

    fileInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.src = ev.target.result;
            img.onload = () => {
                preview.src = img.src; preview.style.display = 'block';
                widthInput.value = img.width;
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('processBtn').onclick = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const scale = widthInput.value / img.width;
        canvas.width = widthInput.value;
        canvas.height = img.height * scale;
        
        // ছবি রেন্ডার করার সময় EXIF অটোমেটিক বাদ হয়ে যায় ক্যানভাসের কারণে
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        let quality = qualityInput.value / 100;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);

        if(targetKb.value) {
            let targetBytes = targetKb.value * 1024;
            let iterations = 0;
            while(dataUrl.length > targetBytes * 1.1 && quality > 0.05 && iterations < 10) {
                quality -= 0.1;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
                iterations++;
            }
        }

        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'sakil-optimized.jpg';
        a.click();
    };
</script>
</body>
</html>
