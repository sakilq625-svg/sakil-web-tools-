<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakil Pro Optimizer | Premium Resizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: white; 
            margin: 0; 
            padding: 2rem; 
        }
        .tool-layout { max-width: 900px; margin: 2rem auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .box { background: var(--glass); backdrop-filter: blur(15px); padding: 2rem; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .upload-box { border: 2px dashed var(--primary); text-align: center; padding: 3rem; cursor: pointer; transition: 0.3s; border-radius: 20px; }
        .upload-box:hover { background: rgba(99, 102, 241, 0.1); }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; background: #334155; color: white; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(to right, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        img { max-width: 100%; border-radius: 15px; display: none; margin-bottom: 1rem; }
    </style>
</head>
<body>

<main class="tool-layout">
    <div class="box">
        <div class="upload-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--primary);"></i>
            <h3>Upload Your Image</h3>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
        <div id="previewPane" style="display:none;">
            <img id="imagePreview">
            <button class="btn" style="background: #ef4444;" onclick="location.reload()">Clear Image</button>
        </div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-sliders"></i> Adjust Settings</h3>
        <input type="number" id="widthInput" class="input-box" placeholder="Width (px)">
        <input type="number" id="heightInput" class="input-box" placeholder="Height (px)">
        <input type="number" id="targetKbInput" class="input-box" placeholder="Target Size (KB)">
        <button class="btn" id="processBtn">Process & Download</button>
    </div>
</main>

<script>
    const fileInput = document.getElementById('fileInput'), previewPane = document.getElementById('previewPane'), imagePreview = document.getElementById('imagePreview'), widthInput = document.getElementById('widthInput'), heightInput = document.getElementById('heightInput'), targetKbInput = document.getElementById('targetKbInput'), processBtn = document.getElementById('processBtn'), dropzone = document.getElementById('dropzone');
    let originalImg = new Image();

    fileInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            originalImg.src = ev.target.result;
            originalImg.onload = () => {
                imagePreview.src = originalImg.src;
                imagePreview.style.display = 'block';
                widthInput.value = originalImg.width;
                heightInput.value = originalImg.height;
                dropzone.style.display = 'none';
                previewPane.style.display = 'block';
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    processBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = widthInput.value;
        canvas.height = heightInput.value;
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);

        let quality = 0.95;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);

        if(targetKbInput.value) {
            while((dataUrl.length * 0.75) / 1024 > targetKbInput.value && quality > 0.1) {
                quality -= 0.05;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }
        }
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'sakil-optimized.jpg';
        a.click();
    };
</script>
</body>
</html>
